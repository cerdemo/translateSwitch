<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Translate Switch</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px 16px;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: Canvas;
        color: CanvasText;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 2px;
      }
      .sub {
        opacity: 0.7;
        margin: 0 0 12px;
        font-size: 12px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      select {
        width: 100%;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px solid rgba(128, 128, 128, 0.45);
        background: Field;
        color: FieldText;
        font-size: 13px;
      }
      button {
        width: 100%;
        margin-top: 10px;
        padding: 9px 10px;
        border: 0;
        border-radius: 8px;
        background: #1a73e8;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: #1a73e8;
        border: 1px solid rgba(26, 115, 232, 0.5);
      }
      button:hover {
        filter: brightness(1.05);
      }
      .status {
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(128, 128, 128, 0.12);
        font-size: 12px;
      }
      .status b {
        font-weight: 600;
      }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        opacity: 0.7;
      }
      kbd {
        font-family: inherit;
        background: rgba(128, 128, 128, 0.2);
        border-radius: 4px;
        padding: 1px 5px;
      }
      #freq-panel {
        margin-top: 10px;
      }
      .freq-list {
        max-height: 220px;
        overflow: auto;
        border: 1px solid rgba(128, 128, 128, 0.3);
        border-radius: 8px;
      }
      .freq-item {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 6px 9px;
      }
      .freq-item + .freq-item {
        border-top: 1px solid rgba(128, 128, 128, 0.18);
      }
      .freq-rank {
        opacity: 0.5;
        font-variant-numeric: tabular-nums;
        min-width: 16px;
      }
      .freq-words {
        flex: 1 1 auto;
        min-width: 0;
      }
      .freq-term {
        font-weight: 600;
      }
      .freq-origin {
        opacity: 0.75;
      }
      .freq-time {
        display: block;
        opacity: 0.5;
        font-size: 11px;
        margin-top: 1px;
      }
      .freq-controls button,
      .freq-actions button {
        margin-top: 8px;
      }
      .freq-actions {
        display: flex;
        gap: 8px;
      }
      .freq-actions button {
        flex: 1;
      }
      .freq-count {
        font-variant-numeric: tabular-nums;
        background: rgba(26, 115, 232, 0.15);
        color: #1a73e8;
        border-radius: 10px;
        padding: 1px 8px;
        font-weight: 600;
        font-size: 12px;
      }
      .freq-empty {
        padding: 10px;
        opacity: 0.7;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Translate Switch</h1>
    <p class="sub">
      The page language is auto-detected and translated into the other language
      of your pair. Press the shortcut to toggle.
    </p>

    <label for="langA">Language A</label>
    <select id="langA"></select>

    <label for="langB" style="margin-top: 10px;">Language B</label>
    <select id="langB"></select>

    <button id="toggle">Toggle this page now</button>
    <button id="download" style="display: none;">Download translation models</button>
    <button id="shortcut" class="secondary">Change keyboard shortcut</button>

    <div class="status" id="status">Checking translation engine...</div>

    <p class="hint">
      Default shortcut: <kbd>Ctrl/Cmd</kbd> + <kbd>Shift</kbd> + <kbd>E</kbd>
    </p>

    <button id="freq-toggle" class="secondary">Word frequency</button>
    <div id="freq-panel" style="display: none;">
      <div class="freq-controls">
        <button id="freq-direction" class="secondary">
          Direction: Translated &rarr; Origin
        </button>
      </div>
      <div class="freq-list" id="freq-list"></div>
      <div class="freq-actions">
        <button id="freq-export" class="secondary">Export CSV</button>
        <button id="freq-clear" class="secondary">Clear history</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
